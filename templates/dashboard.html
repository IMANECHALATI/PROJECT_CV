<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Emotion Analytics | Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Smart Restaurant Emotion Analytics</span>

        <div class="d-flex">
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light me-2">Dashboard</a>
            <a href="{{ url_for('reports') }}" class="btn btn-outline-light me-2">Reports</a>
            <a href="{{ url_for('settings') }}" class="btn btn-outline-light">Settings</a>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4">

    <div class="row">

        <!-- Camera -->
        <div class="col-md-7">
            <div class="card shadow">

                <div class="card-header bg-dark text-white">
                    Live Camera Feed
                </div>

                <div class="card-body text-center">

                    <img
                        src="{{ url_for('video_feed') }}"
                        class="img-fluid rounded"
                        style="max-height:400px; width:100%; object-fit:cover;"
                    >

                    <!-- Current Emotion -->
                    <div class="current-emotion-card mt-3" id="currentEmotionCard">

                        <div class="row align-items-center">

                            <div class="col-4 text-center">
                                <div id="currentEmotionIcon" style="font-size:4rem;"></div>
                            </div>

                            <div class="col-8">
                                <div id="currentEmotionText" class="emotion-name">
                                    neutral
                                </div>

                                <div class="progress mt-2">
                                    <div
                                        id="currentConfidenceBar"
                                        class="progress-bar"
                                        style="width:0%;">
                                    </div>
                                </div>

                                <div
                                    id="currentConfidenceText"
                                    class="confidence-text">
                                    Confidence: 0%
                                </div>
                            </div>

                        </div>

                    </div>

                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="col-md-5">

            <div class="card shadow mb-4">

                <div class="card-header bg-dark text-white">
                    Today's Statistics
                </div>

                <div class="card-body">

                    <div class="row text-center mb-3">

                        <div class="col-6">
                            <div class="stat-card">
                                <div class="stat-value" id="totalFaces">0</div>
                                <div class="stat-label">Total Customers</div>
                            </div>
                        </div>

                        <div class="col-6">
                            <div class="stat-card">
                                <div class="stat-value" id="satisfactionScore">0</div>
                                <div class="stat-label">Satisfaction Score</div>
                            </div>
                        </div>

                    </div>

                    <div id="emotionStatsContainer"></div>

                </div>
            </div>

            <!-- Alert -->
            <div
                class="card shadow border-danger"
                id="alertCard"
                style="display:none;"
            >

                <div class="card-header bg-danger text-white">
                    Smart Alert
                </div>

                <div class="card-body">
                    <div id="alertMessage">
                        Customer dissatisfaction detected
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Charts -->
    <div class="row mt-4">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-dark text-white">
                    Emotion Distribution
                </div>

                <div class="card-body">
                    <canvas id="emotionChart" height="110"></canvas>
                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-header bg-dark text-white">
                    Satisfaction Score
                </div>

                <div class="card-body text-center">

                    <div class="satisfaction-gauge" id="satisfactionGauge">
                        0%
                    </div>

                    <div class="mt-3">
                        <button
                            class="btn btn-sm btn-secondary"
                            onclick="resetStats()">
                            Reset Stats
                        </button>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

</body>
</html>
