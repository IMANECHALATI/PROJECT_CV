<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartResto | Dashboard Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>

    <aside class="sidebar">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Logo" class="sidebar-logo">
            <span>SmartResto</span>
        </div>
        <nav>
            <a href="{{ url_for('index') }}" class="nav-item"><i class="fa-solid fa-house"></i> Accueil</a>
            <a href="{{ url_for('dashboard') }}" class="nav-item active"><i class="fa-solid fa-border-all"></i> Dashboard</a>
            <a href="{{ url_for('reports') }}" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Reports</a>
            <a href="{{ url_for('settings') }}" class="nav-item"><i class="fa-solid fa-sliders"></i> Settings</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div>
                <h1>Analyse Live</h1>
                <p class="subtitle">Surveillance des émotions en temps réel (Modèle VGG Base)</p>
            </div>
            <button id="resetBtn" class="btn-glow"><i class="fa-solid fa-rotate-right"></i> Reset Session</button>
        </header>

        <section class="kpi-grid">
            <div class="glass-card kpi">
                <div class="kpi-icon blue"><i class="fa-solid fa-users-viewfinder"></i></div>
                <div class="kpi-data">
                    <p>Total Clients</p>
                    <h2 id="totalFaces">0</h2>
                </div>
            </div>
            <div class="glass-card kpi">
                <div class="kpi-icon green"><i class="fa-solid fa-face-smile-beam"></i></div>
                <div class="kpi-data">
                    <p>Satisfaction</p>
                    <h2 id="satisfactionScore">0%</h2>
                </div>
            </div>
            <div class="glass-card kpi">
                <div class="kpi-icon purple">
                    <i class="fa-solid fa-video"></i>
                    <span class="live-dot"></span>
                </div>
                <div class="kpi-data">
                    <p>Caméra</p>
                    <h2 id="currentEmotion" class="status-text">Recherche...</h2>
                </div>
            </div>
        </section>

        <section class="dashboard-grid">
            <div class="glass-card video-section">
                <div class="card-header">
                    <h3>Flux Optique</h3>
                    <span class="badge">Live</span>
                </div>
                <div class="video-wrapper">
                    <img src="{{ url_for('video_feed') }}" alt="Video Feed" id="videoFeed">
                </div>
            </div>

            <div class="glass-card chart-section">
                <div class="card-header">
                    <h3>Répartition Globale</h3>
                </div>
                <div class="chart-wrapper">
                    <canvas id="emotionChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
