<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartResto AI | Rapports Hebdo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Logo" class="sidebar-logo">
            <span>SmartResto</span>
        </div>
        <nav>
            <a href="{{ url_for('index') }}" class="nav-item"><i class="fa-solid fa-house"></i> Accueil</a>
            <a href="{{ url_for('dashboard') }}" class="nav-item"><i class="fa-solid fa-border-all"></i> Dashboard</a>
            <a href="{{ url_for('reports') }}" class="nav-item active"><i class="fa-solid fa-chart-pie"></i> Reports</a>
            <a href="{{ url_for('settings') }}" class="nav-item"><i class="fa-solid fa-sliders"></i> Settings</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div>
                <h1>Rapports Hebdomadaires</h1>
                <p class="subtitle">Analyse des tendances historiques de satisfaction client</p>
            </div>
            <div class="actions">
                <button class="btn-glow small"><i class="fa-solid fa-download"></i> Export PDF Premium</button>
            </div>
        </header>

        <section class="glass-card">
            <div class="card-header"><h3>Tendance de Satisfaction (%)</h3></div>
            <div style="height: 380px;">
                <canvas id="trendChart"></canvas>
            </div>
        </section>

        <section class="glass-card" style="margin-top: 30px; padding: 0;">
            <div class="card-header" style="padding: 30px 30px 10px 30px;"><h3>Historique des Sessions</h3></div>
            <table class="premium-table">
                <thead>
                    <tr>
                        <th>Date de Session</th>
                        <th>Clients Analysés</th>
                        <th>Satisfaction</th>
                        <th>Alertes Colère</th>
                    </tr>
                </thead>
                <tbody id="reportTableBody">
                    </tbody>
            </table>
        </section>
    </main>
  <script src="{{ url_for('static', filename='js/reports.js') }}"></script>
</body>
</html>
