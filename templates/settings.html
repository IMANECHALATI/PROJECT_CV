<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartResto | Paramètres IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <aside class="sidebar">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Logo" class="sidebar-logo">
            <span>SmartResto</span>
        </div>
        <nav>
            <a href="{{ url_for('dashboard') }}" class="nav-item"><i class="fa-solid fa-border-all"></i> Dashboard</a>
            <a href="{{ url_for('reports') }}" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Reports</a>
            <a href="{{ url_for('settings') }}" class="nav-item active"><i class="fa-solid fa-sliders"></i> Settings</a>
            <a href="{{ url_for('logout') }}" class="nav-item logout-btn" style="margin-top: 30px; color: #ef4444;">
                <i class="fa-solid fa-right-from-bracket"></i> Déconnexion
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <h1>Paramètres IA & Système</h1>
            <button id="saveSettings" class="btn-glow-gold">Enregistrer les modifications</button>
        </header>

        <div class="settings-grid">
            
            <section class="glass-card">
                <h3><i class="fa-solid fa-microchip"></i> Configuration IA</h3>
                <div class="form-group">
                    <label>Sensibilité de détection face au bruit visuel</label>
                    <input type="range" class="slider" id="sensitivity" min="1" max="15" value="5">
                    <div class="range-labels"><span>Prudent (Beaucoup de visages)</span><span>Sévère (Moins de faux positifs)</span></div>
                </div>
                <div class="form-group">
                    <label>Seuil de confiance de prédiction (%)</label>
                    <input type="number" class="glass-input" id="confidence" value="70">
                </div>
                <div class="form-group" style="margin-top: 25px;">
                    <label>Moteur Deep Learning</label>
                    <select class="glass-input" id="scan_mode" style="color: black;">
                        <option value="deep">🔬 Deep Scan (Haute Précision)</option>
                        <option value="fast">🚀 Scan Rapide (Éco-Performance)</option>
                    </select>
                </div>
            </section>

            <section class="glass-card">
                <h3><i class="fa-solid fa-bell"></i> Système d'Alertes & Données</h3>
                <div class="toggle-group">
                    <span>Activer les Notifications (Colère)</span>
                    <label class="switch"><input type="checkbox" id="alerts_enabled" checked><span class="toggle-slider"></span></label>
                </div>
                <div class="form-group">
                    <label>Délai avant alerte de mécontentement (s)</label>
                    <input type="number" class="glass-input" id="alert_delay" value="10">
                </div>
                <div class="form-group" style="margin-top: 25px;">
                    <label>Rétention des données RGPD (Auto-Delete)</label>
                    <select class="glass-input" id="data_retention" style="color: black;">
                        <option value="never">💾 Ne jamais effacer l'historique</option>
                        <option value="24h">⏱️ Effacer automatiquement après 24 heures</option>
                        <option value="7d">📅 Effacer automatiquement après 7 jours</option>
                    </select>
                </div>
            </section>

            <section class="glass-card" style="grid-column: span 2;">
                <h3><i class="fa-solid fa-video"></i> Flux Optique (Caméra / Vidéo)</h3>
                <div style="display: flex; gap: 20px;">
                    
                    <div class="form-group" style="flex: 1;">
                        <label>Source d'Acquisition</label>
                        <select class="glass-input" id="camera_source" style="color: black;">
                            <option value="0">💻 Webcam intégrée (PC)</option>
                            <option value="1">📷 Webcam externe USB</option>
                            <option value="ip">📱 Caméra IP (Téléphone / Wi-Fi)</option>
                            <option value="video">📼 Vidéo Enregistrée (Fichier MP4)</option>
                        </select>
                    </div>
                    
                    <div class="form-group" id="ip_url_group" style="display: none; flex: 1;">
                        <label>URL de la caméra IP (Ex: http://192.168.1.15:8080/video)</label>
                        <input type="text" class="glass-input" id="ip_url" placeholder="http://192.168.1.X:8080/video">
                    </div>

                    <div class="form-group" id="video_upload_group" style="display: none; flex: 1;">
                        <label>Sélectionner la vidéo de surveillance (.mp4)</label>
                        <input type="file" class="glass-input" id="video_file" accept="video/mp4,video/avi" style="padding: 14px;">
                    </div>

                </div>
            </section>

        </div>
    </main>
    <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
</body>
</html>
