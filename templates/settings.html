<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartResto | Paramètres IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <aside class="sidebar">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='logo.jpeg') }}" alt="Logo" class="sidebar-logo">
            <span>SmartResto</span>
        </div>
        <nav>
           
            <a href="{{ url_for('dashboard') }}" class="nav-item"><i class="fa-solid fa-border-all"></i> Dashboard</a>
            <a href="{{ url_for('reports') }}" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Reports</a>
            <a href="{{ url_for('settings') }}" class="nav-item active"><i class="fa-solid fa-sliders"></i> Settings</a>
                     <!-- Déconnexion en bas -->
    <a href="{{ url_for('logout') }}" class="nav-item logout-btn">
        <i class="fa-solid fa-right-from-bracket"></i> Déconnexion
    </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <h1>Paramètres IA & Système</h1>
            <button id="saveSettings" class="btn-glow-gold">Enregistrer les modifications</button>
        </header>

        <div class="settings-grid">
            <section class="glass-card">
                <h3><i class="fa-solid fa-microchip"></i> Configuration IA</h3>
                <div class="form-group">
                    <label>Sensibilité de détection face au bruit visuel</label>
                    <input type="range" class="slider" id="sensitivity" min="1" max="15" value="5">
                    <div class="range-labels"><span>Prudent (Beaucoup de visages)</span><span>Sévère (Moins de faux positifs)</span></div>
                </div>
                <div class="form-group">
                    <label>Seuil de confiance de prédiction (%)</label>
                    <input type="number" class="glass-input" id="confidence" value="70">
                </div>
            </section>

            <section class="glass-card">
                <h3><i class="fa-solid fa-bell"></i> Système d'Alertes</h3>
                <div class="toggle-group">
                    <span>Activer les Notifications (Colère)</span>
                    <label class="switch"><input type="checkbox" id="alerts_enabled" checked><span class="toggle-slider"></span></label>
                </div>
                <div class="form-group">
                    <label>Délai avant alerte de mécontentement (s)</label>
                    <input type="number" class="glass-input" id="alert_delay" value="10">
                </div>
            </section>
        </div>
    </main>
    <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
</body>
</html>
